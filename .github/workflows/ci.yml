name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-quality:
    name: test-and-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Maven verify (tests + JaCoCo 80%)
        run: mvn -B verify

      - name: SonarCloud scan + quality gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN secret is not set — skipping SonarCloud analysis."
            echo "Add the secret to enable quality-gate enforcement:"
            echo "  gh secret set SONAR_TOKEN -R mohsinds/CharlesSchwabAssignment"
            exit 0
          fi
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.host.url="${SONAR_HOST_URL:-https://sonarcloud.io}" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.organization=mohsinds \
            -Dsonar.projectKey=mohsinds_CharlesSchwabAssignment

      - name: Aggregate Allure results
        if: success()
        run: |
          mkdir -p allure-results-combined
          cp -R event-gateway/target/allure-results/. allure-results-combined/ 2>/dev/null || true
          cp -R account-service/target/allure-results/. allure-results-combined/ 2>/dev/null || true
          test -n "$(ls -A allure-results-combined 2>/dev/null)" || {
            echo "No Allure results found"
            exit 1
          }

      - name: Generate Allure report
        if: success()
        run: |
          curl -fsSL https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz | tar -xz
          ./allure-2.32.0/bin/allure generate allure-results-combined -o allure-report --clean

      - name: Upload Allure artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14

      - name: Upload Pages artifact
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-allure-pages:
    name: deploy-allure-pages
    needs: test-and-quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
