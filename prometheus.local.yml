# Used when apps run on the host (Maven / IDE) and only the observability stack is in Docker:
#   PROMETHEUS_CONFIG=./prometheus.local.yml docker compose up jaeger otel-collector prometheus loki grafana
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: event-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: event-gateway
          env: local
          deployment: local

  - job_name: account-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          service: account-service
          env: local
          deployment: local

  - job_name: jaeger
    metrics_path: /metrics
    static_configs:
      - targets: ["jaeger:14269"]
        labels:
          service: jaeger
          env: local
