server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: account-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  packages-to-scan: com.schwab.eventledger.account.api
  paths-to-match: /accounts/**, /health

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: ${spring.application.name}
      env: ${APP_ENV:local}
      namespace: event-ledger
  observations:
    key-values:
      service: ${spring.application.name}
      env: ${APP_ENV:local}
      namespace: event-ledger
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  opentelemetry:
    resource-attributes:
      "[service.namespace]": event-ledger
      "[deployment.environment]": ${APP_ENV:local}

app:
  env: ${APP_ENV:local}

loki:
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}
  enabled: ${LOKI_ENABLED:true}

account:
  # When false, DEBIT that would make balance < 0 returns HTTP 422
  allowed-negative-balance: ${ACCOUNT_ALLOWED_NEGATIVE_BALANCE:true}

logging:
  level:
    root: INFO
    com.schwab.eventledger: INFO
    com.github.loki4j: WARN
