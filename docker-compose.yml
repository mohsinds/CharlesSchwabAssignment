services:
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: account-service
      SERVER_PORT: "8081"
      APP_ENV: local
      ACCOUNT_ALLOWED_NEGATIVE_BALANCE: "true"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      MANAGEMENT_TRACING_ENABLED: "true"
      LOKI_URL: http://loki:3100/loki/api/v1/push
      LOKI_ENABLED: "true"
    depends_on:
      - otel-collector
      - loki

  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: event-gateway
      SERVER_PORT: "8080"
      APP_ENV: local
      GATEWAY_ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
      GATEWAY_ASYNC_FALLBACK_ENABLED: "true"
      GATEWAY_ACCOUNT_RETRY_MAX_ATTEMPTS: "3"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      MANAGEMENT_TRACING_ENABLED: "true"
      LOKI_URL: http://loki:3100/loki/api/v1/push
      LOKI_ENABLED: "true"
    depends_on:
      - account-service
      - otel-collector
      - loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14269:14269"

  prometheus:
    image: prom/prometheus:v3.2.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${PROMETHEUS_CONFIG:-./prometheus.yml}:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - jaeger

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/event-ledger/event-ledger-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
    extra_hosts:
      - "host.docker.internal:host-gateway"
